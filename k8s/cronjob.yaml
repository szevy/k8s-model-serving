apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-cronjob
spec:
  schedule: "*/1 * * * *"    # every 1 minute (min hour day-of-month month day-of-week)
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: demo-task
              image: busybox
              command: ["/bin/sh", "-c", "echo 'Scheduled run at' $(date)"]
          restartPolicy: Never
