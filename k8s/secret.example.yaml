# EXAMPLE Secret manifest - DO NOT commit real secret values.
# This is a template showing the structure. For real use:
#   - replace the placeholder, keep the real file OUT of git (add to .gitignore), OR
#   - use a secrets manager (AWS Secrets Manager, HashiCorp Vault) or sealed-secrets.
# stringData lets you write plain values; Kubernetes base64-encodes them on apply.
apiVersion: v1
kind: Secret
metadata:
  name: model-secret
type: Opaque
stringData:
  API_KEY: replace-me-with-real-value
